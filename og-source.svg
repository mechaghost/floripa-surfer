<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#9bd8e8"/>
      <stop offset=".55" stop-color="#d8eff5"/>
      <stop offset="1" stop-color="#ffd9a0"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#7fd0e8"/>
      <stop offset="1" stop-color="#1f7da0"/>
    </linearGradient>
    <linearGradient id="seaBack" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#b6e3ef"/>
      <stop offset="1" stop-color="#6fc1d8"/>
    </linearGradient>
  </defs>

  <!-- sky -->
  <rect width="1200" height="630" fill="url(#sky)"/>

  <!-- sun -->
  <circle cx="940" cy="200" r="58" fill="#ffd07a"/>
  <circle cx="940" cy="200" r="78" fill="#ffd07a" opacity=".25"/>

  <!-- back sea (horizon) -->
  <path d="M0 360 Q600 348 1200 360 L1200 630 L0 630 Z" fill="url(#seaBack)"/>

  <!-- distant island silhouette -->
  <path d="M180 360 Q230 320 270 332 Q310 318 340 360 Z" fill="#8bbf8c" opacity=".55"/>

  <!-- main island -->
  <g>
    <path d="M740 410 Q820 300 880 312 Q940 290 1000 312 Q1050 330 1080 410 Z" fill="#7cc06b"/>
    <path d="M880 312 Q940 290 1000 312 Q1050 330 1080 410 L980 410 Q960 340 900 320 Z" fill="#5da753"/>

    <!-- palm trunk -->
    <path d="M880 405 Q872 350 895 280" stroke="#6b3e1f" stroke-width="11" fill="none" stroke-linecap="round"/>
    <!-- palm fronds -->
    <g stroke="#3f7a36" stroke-width="13" fill="none" stroke-linecap="round">
      <path d="M895 280 q-58 -10 -86 22"/>
      <path d="M895 280 q60 -8 88 22"/>
      <path d="M895 280 q-22 -52 -58 -62"/>
      <path d="M895 280 q22 -52 58 -62"/>
    </g>
    <!-- coconuts -->
    <circle cx="903" cy="288" r="7" fill="#6b3e1f"/>
    <circle cx="888" cy="294" r="7" fill="#6b3e1f"/>

    <!-- second smaller palm -->
    <path d="M1010 408 Q1006 370 996 330" stroke="#6b3e1f" stroke-width="7" fill="none" stroke-linecap="round"/>
    <g stroke="#3f7a36" stroke-width="9" fill="none" stroke-linecap="round">
      <path d="M996 330 q-34 -6 -52 14"/>
      <path d="M996 330 q34 -6 52 14"/>
      <path d="M996 330 q-12 -32 -34 -38"/>
      <path d="M996 330 q12 -32 34 -38"/>
    </g>
  </g>

  <!-- front wave -->
  <path d="M-10 440 Q150 410 320 440 T660 440 T1000 440 T1210 440 L1210 640 L-10 640 Z" fill="url(#sea)"/>
  <!-- foam crest -->
  <path d="M-10 440 Q150 410 320 440 T660 440 T1000 440 T1210 440" stroke="#f7fffd" stroke-width="6" fill="none"/>

  <!-- foam streaks -->
  <g stroke="#f7fffd" stroke-width="4" fill="none" opacity=".75" stroke-linecap="round">
    <path d="M80 510 q40 -16 80 0"/>
    <path d="M260 540 q40 -16 80 0"/>
    <path d="M460 515 q40 -16 80 0"/>
    <path d="M640 555 q40 -16 80 0"/>
    <path d="M860 525 q40 -16 80 0"/>
    <path d="M1060 555 q40 -16 80 0"/>
  </g>

  <!-- title -->
  <g font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="80" y="180" font-size="108" font-weight="800" fill="#013349" letter-spacing="-3">
      Floripa Surfer
    </text>
    <text x="84" y="232" font-size="32" font-weight="500" fill="#013349" opacity=".75" letter-spacing=".5">
      Carve waves in your browser
    </text>
  </g>
</svg>
